# gitleaks configuration for cs-webinars.
#
# Extends gitleaks' built-in ruleset (so every default secret rule still
# runs) and adds a narrowly-scoped allowlist for values we have confirmed
# are safe to publish. Keep entries here specific to a single file path and
# documented. An over-broad allowlist quietly turns the scan off.
#
# When to add an entry, and how, is written up in
# docs/overriding-a-safe-secret-scan.md.

title = "cs-webinars gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = """
Throwaway self-signed TLS material generated for the Hardening Konnect lab.
The private key is regenerated by attendees when they run the lab; it grants
access to nothing and is published deliberately as sample material.
See docs/overriding-a-safe-secret-scan.md for the reasoning trail.
"""
paths = [
  '''^webinars/2026-07-hardening-konnect/00-base/cert/tls\.(key|cert)$''',
]
