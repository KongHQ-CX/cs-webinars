<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock title %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock description %}">
  <link rel="icon" type="image/svg+xml" href="{{ get_url(path="brand/Kong-Logomark.svg") }}">
  <link rel="stylesheet" href="{{ get_url(path="style.css") }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a href="{{ get_url(path="/") }}" class="site-header__brand">
        <img class="site-header__logomark" src="{{ get_url(path="brand/Kong-Logomark.svg") }}" alt="">
        <span class="site-header__wordmark">Kong CS Webinars</span>
      </a>
      <nav class="site-header__links">
        <a href="https://konghq.com" target="_blank" rel="noopener">kong.com &#8599;</a>
        <a href="https://developer.konghq.com" target="_blank" rel="noopener">Docs &#8599;</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock content %}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      Copyright &copy; 2026 <a href="https://konghq.com">Kong, Inc.</a> &middot; <a href="https://developer.konghq.com">Docs</a>
    </div>
  </footer>
</body>
</html>
