base_url = "https://konghq-cx.github.io/cs-webinars"
title = "Kong CS Webinars"
description = "Slides, code, and demo assets from Kong Customer Success-led webinars"
compile_sass = true
build_search_index = false
minify_html = true
generate_feeds = false

[extra]
repo_slug = "KongHQ-CX/cs-webinars"
# Canonical tag list, in display order. Tags are a single pool that mixes Kong
# products with thematic tags; the webinars page renders a filter chip for each
# tag that at least one session actually uses, so adding a tag here is harmless
# until a webinar references it. Keeping products first, then themes, just makes
# the chip row read naturally. A page opts in via `tags = [...]` under its own
# `[extra]` (see docs/adding-webinar-assets.md).
tags = [
  "Konnect", "Gateway", "Mesh", "AI Gateway", "Insomnia",
  "Security", "Observability", "Migration", "Getting Started",
]
