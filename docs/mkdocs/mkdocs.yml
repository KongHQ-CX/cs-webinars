site_name: Kong CS Webinars
site_description: Slides, code, and demo assets from Kong Customer Success-led webinars
site_url: https://konghq-cx.github.io/cs-webinars/
repo_url: https://github.com/KongHQ-CX/cs-webinars
repo_name: KongHQ-CX/cs-webinars
edit_uri: edit/main/docs/mkdocs/docs/

theme:
  name: material
  logo: assets/brand/dark-backgrounds/svg/Kong-Logomark.svg
  favicon: assets/brand/dark-backgrounds/svg/Kong-Logomark.svg
  font:
    text: Funnel Sans
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/KongHQ-CX/cs-webinars
      name: Source on GitHub

copyright: 'Copyright &copy; 2026 <a href="https://konghq.com">Kong, Inc.</a>'

plugins:
  - search
  - awesome-pages

extra_css:
  - stylesheets/kong-brand.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

# nav: omitted by design. The awesome-pages plugin reads .pages files
# in each docs directory to control order.
