# Helm values — Lab 4: Strip fingerprints and configure real IP.
# Builds on Lab 1 (HTTPS-only) and Lab 2 (vault env vars).
# Admin API not configured — it is managed by Konnect cloud.

image:
  repository: kong/kong-gateway
  tag: "3.15"

replicaCount: 2

podLabels:
  app: kong-dp
  lab: "04-fingerprints"

admin:
  enabled: false

manager:
  enabled: false

env:
  role: data_plane
  database: "off"
  konnect_mode: "on"
  vitals: "off"
  # ----- Hybrid mode -----
  cluster_control_plane: "76a3d6a237.in.cp.konghq.com:443"
  cluster_server_name: "76a3d6a237.in.cp.konghq.com"
  cluster_telemetry_endpoint: "76a3d6a237.in.tp.konghq.com:443"
  cluster_telemetry_server_name: "76a3d6a237.in.tp.konghq.com"
  cluster_mtls: pki
  cluster_cert: /etc/secrets/kong-cluster-cert/tls.crt
  cluster_cert_key: /etc/secrets/kong-cluster-cert/tls.key
  lua_ssl_trusted_certificate: system

  # ----- Carry-forward from Lab 1: HTTPS-only proxy, TLS 1.2+ -----
  ssl_cert: /etc/secrets/kong-proxy-tls/tls.crt
  ssl_cert_key: /etc/secrets/kong-proxy-tls/tls.key
  ssl_protocols: "TLSv1.2 TLSv1.3"
  ssl_ciphers: "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256"
  ssl_prefer_server_ciphers: "on"

  # ----- Carry-forward from Lab 2: HTTPS vault backend -----
  vault_hcv_protocol: "https"
  vault_hcv_host: "vault.vault.svc"
  vault_hcv_port: "8200"
  vault_hcv_mount: "kv"
  vault_hcv_kv: "v2"
  vault_hcv_auth_method: approle
  vault_hcv_tls_verify: "true"
  vault_hcv_tls_server_name: "vault.vault.svc"
  vault_hcv_tls_ca_cert: /etc/secrets/kong-labs-ca/ca.crt
  vault_hcv_ttl: "300"

  # ----- Lab 4: Remove fingerprints (Control #12) -----
  # Disables Kong-specific response headers (X-Kong-*, Via, Server: kong).
  # NOTE: do NOT also set nginx_http_server_tokens — Kong's generated
  # nginx-kong.conf already hardcodes "server_tokens off;" in the http block
  # unconditionally (independent of this `headers` setting), so injecting it
  # again via KONG_NGINX_HTTP_SERVER_TOKENS causes nginx to reject the config
  # with "server_tokens directive is duplicate". The nginx Server banner is
  # already stripped by Kong's default template; nothing extra is needed.
  headers: "off"
  kong_debug: "off"
  # ----- Lab 4: Disable access log (Control #16) -----
  # Suppresses per-request access log lines that could leak path / IP.
  proxy_access_log: "off"
  proxy_error_log: /dev/stderr
  untrusted_lua: "off"

  # ----- Lab 4: Real IP from GKE load balancer (Control #17) -----
  # GKE's `type: LoadBalancer` Service is a GCP Network LB (L4 passthrough) —
  # it does NOT inject X-Forwarded-For like an HTTP(S) LB would. It preserves
  # the real client IP on the TCP connection itself (helped by
  # `externalTrafficPolicy: Local` below, which avoids an extra SNAT hop from
  # kube-proxy). So Kong must be the one to populate X-Forwarded-For, from
  # that real connection IP, rather than "trusting" a header nothing sets.
  #
  # real_ip_header stays at its default (X-Real-IP via proxy_protocol/socket)
  # since there's no upstream proxy IP to extract a header from — Kong reads
  # the peer IP directly off the connection.
  trusted_ips: "0.0.0.0/0,::/0"
  real_ip_header: "X-Forwarded-For"
customEnv:
  KONG_VAULT_HCV_APPROLE_ROLE_ID:
    valueFrom:
      secretKeyRef:
        name: kong-vault-approle
        key: role_id
  KONG_VAULT_HCV_APPROLE_SECRET_ID:
    valueFrom:
      secretKeyRef:
        name: kong-vault-approle
        key: secret_id

secretVolumes:
  - kong-cluster-cert
  - kong-proxy-tls
  - kong-labs-ca

proxy:
  enabled: true
  type: LoadBalancer
  externalTrafficPolicy: Local
  labels:
    app: kong-dp
  http:
    enabled: false
  tls:
    enabled: true
    servicePort: 443
    containerPort: 8443
    parameters:
      - http2

ingressController:
  enabled: false
