# TLS leaf certificate for the Vault server listener.
# Reuses the lab CA issuer already created for the Kong proxy cert
# (00-base/tls/self-signed-issuer.yaml) so Kong's DP trusts both with the
# same lua_ssl_trusted_certificate: system chain once the CA is installed
# cluster-wide, or via vault_hcv_tls_verify + a mounted CA bundle.
#
# cert-manager writes the signed cert + key into Secret 'vault-server-tls'
# in the vault namespace, mounted by the Vault server pod for HTTPS.
#
# Apply after: 00-base/tls/self-signed-issuer.yaml
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-server-tls
  namespace: vault
spec:
  secretName: vault-server-tls
  commonName: vault.vault.svc
  dnsNames:
    - vault.vault.svc
    - vault.vault.svc.cluster.local
    - vault
    - localhost
  duration: 2160h     # 90 days
  renewBefore: 360h   # renew 15 days before expiry
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  usages:
    - digital signature
    - key encipherment
    - server auth
  issuerRef:
    name: kong-labs-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
