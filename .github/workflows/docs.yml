name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

env:
  ZOLA_VERSION: 0.22.1
  ZOLA_SHA256: 0ca09aa40376aaa9ddfb512ff9ad963262ef95edb0d0f2d5ec6961b6f5cf22ef

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install zola
        run: |
          curl -sSfL -o zola.tar.gz \
            "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          echo "${ZOLA_SHA256}  zola.tar.gz" | sha256sum -c -
          tar -xzf zola.tar.gz zola
          sudo mv zola /usr/local/bin/zola
          rm zola.tar.gz

      - name: Check site
        working-directory: docs/zola
        run: zola check

      - name: Build site
        working-directory: docs/zola
        run: zola build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/zola/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
