name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fill in release download links
        run: |
          for f in docs/mkdocs/docs/webinars/*.md; do
            slug=$(basename "$f" .md)
            url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${slug}/${slug}.zip"
            sed -i "s#{{ RELEASE_ZIP }}#${url}#g" "$f"
          done

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: docs/mkdocs/requirements.txt

      - run: pip install -r docs/mkdocs/requirements.txt

      - run: mkdocs build -f docs/mkdocs/mkdocs.yml --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/mkdocs/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
